[package]
name = "synchronicity-engine"
version.workspace = true
edition.workspace = true

[[bin]]
name = "synchronicity-engine"
path = "src/main.rs"

[lib]
name = "synchronicity_engine"
path = "src/lib.rs"

[dependencies]
dioxus = { version = "0.7", features = ["desktop"] }
indras-network = { path = "../indras-network" }
indras-relay = { path = "../indras-relay", features = ["homepage"] }
indras-crypto = { path = "../indras-crypto" }
indras-genesis = { path = "../indras-genesis" }
indras-storage = { path = "../indras-storage" }
indras-sync-engine = { path = "../indras-sync-engine" }
indras-homepage = { path = "../indras-homepage" }
indras-artifacts = { path = "../indras-artifacts" }
indras-ui = { path = "../indras-ui" }
indras-logging = { path = "../indras-logging" }
dashmap = "6"
tokio = { version = "1", features = ["full", "sync", "rt-multi-thread"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = "0.4"
open = "5"
notify = { version = "7", features = ["macos_fsevent"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4"

[dev-dependencies]
tokio = { version = "1", features = ["full", "rt-multi-thread", "macros"] }
tempfile = "3"
indras-storage = { path = "../indras-storage" }
