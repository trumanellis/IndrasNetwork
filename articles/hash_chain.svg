<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#9aa0a6"/>
    </marker>
    <linearGradient id="genesis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0fe"/>
      <stop offset="100%" stop-color="#d2e3fc"/>
    </linearGradient>
    <linearGradient id="farewell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce8e6"/>
      <stop offset="100%" stop-color="#f8d7da"/>
    </linearGradient>
  </defs>

  <!-- Event 0: Genesis -->
  <rect x="10" y="20" width="140" height="100" rx="8" fill="url(#genesis)" stroke="#34a853" stroke-width="1.5"/>
  <text x="80" y="42" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8e3e">seq 0 — genesis</text>
  <text x="80" y="60" text-anchor="middle" font-size="10" fill="#5f6368">from: None</text>
  <text x="80" y="74" text-anchor="middle" font-size="10" fill="#5f6368">to: Aurora</text>
  <text x="80" y="92" text-anchor="middle" font-size="9" fill="#9aa0a6">prev: 000000…</text>
  <text x="80" y="108" text-anchor="middle" font-size="9" fill="#34a853">sig: PQ ✓</text>

  <!-- Arrow 0→1 -->
  <line x1="150" y1="70" x2="182" y2="70" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="166" y="62" text-anchor="middle" font-size="8" fill="#9aa0a6">hash</text>

  <!-- Event 1: Switch -->
  <rect x="190" y="20" width="140" height="100" rx="8" fill="url(#event)" stroke="#4285f4" stroke-width="1.5"/>
  <text x="260" y="42" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a73e8">seq 1 — switch</text>
  <text x="260" y="60" text-anchor="middle" font-size="10" fill="#5f6368">from: Aurora</text>
  <text x="260" y="74" text-anchor="middle" font-size="10" fill="#5f6368">to: Cypress</text>
  <text x="260" y="92" text-anchor="middle" font-size="9" fill="#9aa0a6">prev: a3f7c2…</text>
  <text x="260" y="108" text-anchor="middle" font-size="9" fill="#1a73e8">sig: PQ ✓</text>

  <!-- Arrow 1→2 -->
  <line x1="330" y1="70" x2="362" y2="70" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="346" y="62" text-anchor="middle" font-size="8" fill="#9aa0a6">hash</text>

  <!-- Event 2: Switch -->
  <rect x="370" y="20" width="140" height="100" rx="8" fill="url(#event)" stroke="#4285f4" stroke-width="1.5"/>
  <text x="440" y="42" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a73e8">seq 2 — switch</text>
  <text x="440" y="60" text-anchor="middle" font-size="10" fill="#5f6368">from: Cypress</text>
  <text x="440" y="74" text-anchor="middle" font-size="10" fill="#5f6368">to: Eden</text>
  <text x="440" y="92" text-anchor="middle" font-size="9" fill="#9aa0a6">prev: 8b21e9…</text>
  <text x="440" y="108" text-anchor="middle" font-size="9" fill="#1a73e8">sig: PQ ✓</text>

  <!-- Arrow 2→3 -->
  <line x1="510" y1="70" x2="542" y2="70" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="526" y="62" text-anchor="middle" font-size="8" fill="#9aa0a6">hash</text>

  <!-- Event 3: Farewell -->
  <rect x="550" y="20" width="140" height="100" rx="8" fill="url(#farewell)" stroke="#d93025" stroke-width="1.5"/>
  <text x="620" y="42" text-anchor="middle" font-size="12" font-weight="bold" fill="#c5221f">seq 3 — farewell</text>
  <text x="620" y="60" text-anchor="middle" font-size="10" fill="#5f6368">from: Eden</text>
  <text x="620" y="74" text-anchor="middle" font-size="10" fill="#5f6368">to: None</text>
  <text x="620" y="92" text-anchor="middle" font-size="9" fill="#9aa0a6">prev: f4c017…</text>
  <text x="620" y="108" text-anchor="middle" font-size="9" fill="#c5221f">sig: PQ ✓</text>

  <!-- Annotation: continuity -->
  <text x="260" y="148" text-anchor="middle" font-size="10" fill="#5f6368">Each event's </text>
  <text x="321" y="148" font-size="10" font-weight="bold" fill="#5f6368">from</text>
  <text x="347" y="148" font-size="10" fill="#5f6368"> must match the previous event's </text>
  <text x="557" y="148" font-size="10" font-weight="bold" fill="#5f6368">to</text>
</svg>
