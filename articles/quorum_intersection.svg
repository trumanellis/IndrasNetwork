<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <clipPath id="leftClip">
      <rect x="0" y="0" width="340" height="320"/>
    </clipPath>
    <clipPath id="rightClip">
      <rect x="340" y="0" width="340" height="320"/>
    </clipPath>
  </defs>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">Why equivocation fails: quorum intersection (n=7, f=2, k=5)</text>

  <!-- Left quorum circle -->
  <ellipse cx="270" cy="170" rx="160" ry="120" fill="#e8f0fe" fill-opacity="0.6" stroke="#4285f4" stroke-width="1.5"/>
  <text x="150" y="68" font-size="12" font-weight="bold" fill="#1a73e8">Quorum A (k=5)</text>
  <text x="150" y="82" font-size="10" fill="#5f6368">certifying "focused on Aurora"</text>

  <!-- Right quorum circle -->
  <ellipse cx="410" cy="170" rx="160" ry="120" fill="#fce8e6" fill-opacity="0.6" stroke="#d93025" stroke-width="1.5"/>
  <text x="432" y="68" font-size="12" font-weight="bold" fill="#c5221f">Quorum B (k=5)</text>
  <text x="432" y="82" font-size="10" fill="#5f6368">certifying "focused on Cypress"</text>

  <!-- Overlap region label -->
  <text x="340" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b1fa2">overlap ≥ f+1 = 3</text>

  <!-- Witnesses: Left only (2) -->
  <circle cx="170" cy="150" r="16" fill="#c6dafc" stroke="#4285f4" stroke-width="1.5"/>
  <text x="170" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a73e8">W₁</text>

  <circle cx="190" cy="210" r="16" fill="#c6dafc" stroke="#4285f4" stroke-width="1.5"/>
  <text x="190" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a73e8">W₂</text>

  <!-- Witnesses: Overlap (3) — one honest, two could be Byzantine -->
  <circle cx="300" cy="135" r="16" fill="#e1bee7" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="300" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b1fa2">W₃</text>
  <text x="300" y="158" text-anchor="middle" font-size="8" fill="#9aa0a6">Byzantine</text>

  <circle cx="340" cy="185" r="18" fill="#ce93d8" stroke="#7b1fa2" stroke-width="2"/>
  <text x="340" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a148c">W₄</text>
  <text x="340" y="208" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a148c">HONEST</text>

  <circle cx="380" cy="135" r="16" fill="#e1bee7" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="380" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b1fa2">W₅</text>
  <text x="380" y="158" text-anchor="middle" font-size="8" fill="#9aa0a6">Byzantine</text>

  <!-- Witnesses: Right only (2) -->
  <circle cx="490" cy="150" r="16" fill="#f8cecc" stroke="#d93025" stroke-width="1.5"/>
  <text x="490" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#c5221f">W₆</text>

  <circle cx="510" cy="210" r="16" fill="#f8cecc" stroke="#d93025" stroke-width="1.5"/>
  <text x="510" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#c5221f">W₇</text>

  <!-- Bottom explanation -->
  <rect x="100" y="268" width="480" height="42" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1"/>
  <text x="340" y="285" text-anchor="middle" font-size="11" fill="#4a148c">Even with 2 Byzantine witnesses (max f), at least 1 honest witness</text>
  <text x="340" y="300" text-anchor="middle" font-size="11" fill="#4a148c">is in both quorums — and will refuse to sign both conflicting events.</text>
</svg>
